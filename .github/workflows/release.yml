name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build & publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test PCCleaner.Tests --no-restore -c Release

      - name: Publish Windows x64
        run: |
          dotnet publish PCCleaner.App \
            -c Release -r win-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/win

      - name: Publish Linux x64
        run: |
          dotnet publish PCCleaner.App \
            -c Release -r linux-x64 \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o publish/linux

      - name: Rename artifacts
        run: |
          mv publish/win/PCCleaner.App.exe  publish/PCCleaner-win-x64.exe
          mv publish/linux/PCCleaner.App    publish/PCCleaner-linux-x64
          chmod +x publish/PCCleaner-linux-x64

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk "/^## v${VERSION}/{found=1; next} found && /^## v/{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PC Cleaner ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.body }}
          files: |
            publish/PCCleaner-win-x64.exe
            publish/PCCleaner-linux-x64
